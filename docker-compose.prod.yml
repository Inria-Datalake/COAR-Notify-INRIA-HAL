# Production deployment — pulls the pinned, published image (no local build).
#
# Usage:
#   1. Create .env from .env.example and set REAL secrets (see PRODUCTION CHECKLIST below).
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Pin APP_IMAGE_TAG to the release you want to run. Override per-deploy with:
#   APP_IMAGE_TAG=v0.2.1 docker compose -f docker-compose.prod.yml up -d

services:
  arangodb:
    image: arangodb:3.11
    environment:
      # `:?` makes the variable REQUIRED — compose refuses to start if it is unset,
      # so you can never accidentally ship the dev default password to production.
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:?set a strong ARANGO_ROOT_PASSWORD in .env}
    # Bind the DB to loopback only — it must not be reachable from outside the host.
    ports:
      - "127.0.0.1:${ARANGO_PORT:-8529}:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint tcp://127.0.0.1:8529 --server.password \"$ARANGO_ROOT_PASSWORD\" --javascript.execute-string 'db._databases()'"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    image: lfoppiano/coar-notify-inria-hal:${APP_IMAGE_TAG:-v0.2.0}
    pull_policy: always
    depends_on:
      arangodb:
        condition: service_healthy
    environment:
      ARANGO_HOST: arangodb
      ARANGO_PORT: 8529
      ARANGO_USERNAME: root
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:?set a strong ARANGO_ROOT_PASSWORD in .env}
      FLASK_PORT: ${FLASK_PORT:-5000}
      # Behind a reverse proxy terminating TLS:
      FORWARDED_FOR_PROTO: https
      SCRIPT_NAME: ""
    ports:
      - "${FLASK_PORT:-5000}:5000"
    # App config (API_TOKEN, COAR_ORIGIN_BASE_URL, HAL/SWH tokens, ...) is read
    # from this mounted .env at runtime.
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    command: ["wait-for-it", "--host=arangodb", "--port=8529", "--", "gunicorn", "-w", "4", "-b", "0.0.0.0:5000", "--timeout", "60", "--log-level", "info", "app.app:app"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  arangodb_data:
  arangodb_apps:

# PRODUCTION CHECKLIST (.env):
#   ARANGO_ROOT_PASSWORD  -> strong, unique (REQUIRED; no default)
#   API_TOKEN             -> strong value; python -c "import secrets; print(secrets.token_urlsafe(32))"
#   COAR_ORIGIN_BASE_URL  -> your public base URL, no trailing slash (e.g. https://prod-...inria.fr/coar)
#   HAL_* / SWH_*         -> production endpoints + real tokens (not the preprod/staging defaults)
